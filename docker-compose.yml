services:
  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: dds-api
    environment:
      CORS_ORIGIN: http://localhost:8080
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3000/').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))"]
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 5s
    volumes:
      - ./api/data:/app/data

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: /api
    container_name: dds-frontend
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "127.0.0.1:8080:80"
